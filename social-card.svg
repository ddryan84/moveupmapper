<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="80" y="130" width="5" height="180" rx="3" fill="#818cf8"/>

  <!-- Brand name -->
  <text x="107" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">Move Up Mapper</text>

  <!-- Tagline -->
  <text x="107" y="258" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#94a3b8" letter-spacing="0.2">Housing decisions start with better math.</text>

  <!-- Divider -->
  <rect x="107" y="295" width="980" height="1.5" fill="#334155"/>

  <!-- Three calculator pills -->
  <!-- Rent vs. Buy -->
  <rect x="107" y="330" width="290" height="52" rx="10" fill="#4f46e5" fill-opacity="0.9"/>
  <text x="252" y="362" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Rent vs. Buy Analysis</text>

  <!-- Home Swap -->
  <rect x="415" y="330" width="270" height="52" rx="10" fill="#6366f1" fill-opacity="0.9"/>
  <text x="550" y="362" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Home Swap Calculator</text>

  <!-- Compound Growth -->
  <rect x="703" y="330" width="270" height="52" rx="10" fill="#0891b2" fill-opacity="0.9"/>
  <text x="838" y="362" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Compound Growth</text>

  <!-- Sub-label -->
  <text x="107" y="430" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#64748b">Free calculators. No account required. Your data stays in your browser.</text>

  <!-- Domain -->
  <text x="107" y="530" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569" letter-spacing="0.5">moveupmapper.com</text>

  <!-- Decorative chart lines (right side) -->
  <polyline points="920,200 960,160 1000,180 1040,120 1080,140 1120,90" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="920,220 960,210 1000,195 1040,175 1080,165 1120,140" fill="none" stroke="#0891b2" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
