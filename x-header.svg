<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1500 500" width="1500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    ]]></style>

    <radialGradient id="bgGlow" cx="62%" cy="48%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#181c50"/>
      <stop offset="100%" stop-color="#09091e"/>
    </radialGradient>

    <radialGradient id="tealGlow" cx="82%" cy="55%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bandFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.20"/>
    </linearGradient>

    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1500" height="500" fill="url(#bgGlow)"/>
  <rect width="1500" height="500" fill="url(#tealGlow)"/>

  <!-- ── Subtle grid ── -->
  <line x1="0" y1="125" x2="1500" y2="125" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="250" x2="1500" y2="250" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="375" x2="1500" y2="375" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- ── Chart visualization ── -->

  <!-- Band fill (between optimistic and pessimistic bounds) -->
  <polygon
    points="0,452 200,446 400,432 600,410 800,378 1000,334 1200,272 1400,200 1500,162
            1500,228 1400,268 1200,338 1000,402 800,444 600,470 400,484 200,492 0,495"
    fill="url(#bandFill)"/>

  <!-- Optimistic bound (upper, dashed indigo) -->
  <polyline
    points="0,452 200,446 400,432 600,410 800,378 1000,334 1200,272 1400,200 1500,162"
    fill="none" stroke="#6366f1" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="7,5"
    stroke-linecap="round"/>

  <!-- Pessimistic bound (lower, dashed indigo) -->
  <polyline
    points="0,495 200,492 400,484 600,470 800,444 1000,402 1200,338 1400,268 1500,228"
    fill="none" stroke="#6366f1" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="7,5"
    stroke-linecap="round"/>

  <!-- Contributions-only baseline (flat gray dashed) -->
  <line x1="0" y1="497" x2="1500" y2="480"
    stroke="#94a3b8" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="5,6"/>

  <!-- Main curve (teal, compound growth) -->
  <polyline
    points="0,474 150,470 300,463 450,452 600,438 750,417 900,390 1050,352 1200,302 1350,242 1500,195"
    fill="none" stroke="#0891b2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data circles along main curve -->
  <circle cx="0"    cy="474" r="5"  fill="#0891b2" opacity="0.55"/>
  <circle cx="300"  cy="463" r="4.5" fill="#0891b2" opacity="0.60"/>
  <circle cx="600"  cy="438" r="4.5" fill="#0891b2" opacity="0.70"/>
  <circle cx="900"  cy="390" r="5"  fill="#0891b2" opacity="0.80"/>
  <circle cx="1200" cy="302" r="5.5" fill="#0891b2" opacity="0.90"/>
  <circle cx="1500" cy="195" r="6.5" fill="#0891b2"/>
  <!-- Glow on final point -->
  <circle cx="1500" cy="195" r="18"  fill="url(#dotGlow)"/>

  <!-- Right-side label -->
  <text x="1462" y="176"
    font-size="10.5" font-family="Arial, sans-serif" font-weight="600"
    fill="#0891b2" fill-opacity="0.85" text-anchor="end" letter-spacing="1">
    PORTFOLIO GROWTH
  </text>
  <line x1="1465" y1="180" x2="1494" y2="193"
    stroke="#0891b2" stroke-opacity="0.4" stroke-width="1"/>

  <!-- ── Left accent bar ── -->
  <rect x="198" y="145" width="4" height="222" rx="2" fill="#6366f1"/>

  <!-- ── Brand content ── -->

  <!-- Eyebrow label -->
  <text x="220" y="176"
    font-size="11" font-family="Arial, 'Inter', sans-serif" font-weight="600"
    fill="#8b8fbe" letter-spacing="3.2">
    HOUSING &amp; INVESTMENT CALCULATORS
  </text>

  <!-- Brand name -->
  <text x="218" y="272"
    font-size="76" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-weight="700" fill="white">
    Move Up Mapper
  </text>

  <!-- Tagline -->
  <text x="221" y="318"
    font-size="21.5" font-family="Arial, 'Inter', sans-serif"
    fill="#b2bcd8">
    Housing decisions start with better math.
  </text>

  <!-- Rule -->
  <line x1="221" y1="346" x2="895" y2="346" stroke="white" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Tool chips -->
  <!-- Chip 1: Rent vs. Buy -->
  <rect x="221" y="362" width="169" height="31" rx="15.5"
    fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-opacity="0.50" stroke-width="1"/>
  <text x="305" y="382.5"
    font-size="11.5" font-family="Arial, 'Inter', sans-serif" font-weight="600"
    fill="#a5b4fc" text-anchor="middle">Rent vs. Buy Analysis</text>

  <!-- Chip 2: Home Swap -->
  <rect x="403" y="362" width="172" height="31" rx="15.5"
    fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-opacity="0.50" stroke-width="1"/>
  <text x="489" y="382.5"
    font-size="11.5" font-family="Arial, 'Inter', sans-serif" font-weight="600"
    fill="#a5b4fc" text-anchor="middle">Home Swap Calculator</text>

  <!-- Chip 3: Compound Growth -->
  <rect x="588" y="362" width="152" height="31" rx="15.5"
    fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-opacity="0.50" stroke-width="1"/>
  <text x="664" y="382.5"
    font-size="11.5" font-family="Arial, 'Inter', sans-serif" font-weight="600"
    fill="#a5b4fc" text-anchor="middle">Compound Growth</text>

  <!-- Chip 4: Free / No signup -->
  <rect x="753" y="362" width="148" height="31" rx="15.5"
    fill="#0891b2" fill-opacity="0.16" stroke="#0891b2" stroke-opacity="0.40" stroke-width="1"/>
  <text x="827" y="382.5"
    font-size="11.5" font-family="Arial, 'Inter', sans-serif" font-weight="600"
    fill="#67e8f9" text-anchor="middle">Free · No signup</text>

  <!-- URL (bottom right, very muted) -->
  <text x="1482" y="484"
    font-size="13" font-family="Arial, 'Inter', sans-serif"
    fill="#383c6a" text-anchor="end" letter-spacing="0.3">
    moveupmapper.com
  </text>

</svg>
