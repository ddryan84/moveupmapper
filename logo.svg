<svg viewBox="0 0 196 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Move Up Mapper">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded square with gradient -->
  <rect width="48" height="48" rx="11" fill="url(#iconGrad)"/>

  <!-- Arrow pointing up from house peak -->
  <polyline points="18.5 13 24 7.5 29.5 13"
            fill="none" stroke="white" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="24" y1="7.5" x2="24" y2="18"
        stroke="white" stroke-width="2.6" stroke-linecap="round"/>

  <!-- House: peak meets arrow base at (24,18) -->
  <path d="M5 30 L24 18 L43 30 V43 H5 Z"
        fill="none" stroke="white" stroke-width="2.6"
        stroke-linejoin="round"/>

  <!-- Door -->
  <path d="M18.5 43 V34.5 H29.5 V43"
        fill="none" stroke="white" stroke-width="2.6"
        stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="62" y="21"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17" font-weight="700" fill="#111827" letter-spacing="-0.3">Move Up</text>
  <text x="63" y="38"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" fill="#6b7280" letter-spacing="3">MAPPER</text>
</svg>
