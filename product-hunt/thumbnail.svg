<svg viewBox="0 0 240 240" width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="40" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="240" y2="80" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="160" x2="240" y2="160" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="240" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="240" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Map pin body -->
  <path d="M120 52 C97 52 78 71 78 94 C78 122 120 168 120 168 C120 168 162 122 162 94 C162 71 143 52 120 52 Z"
        fill="url(#pin)"/>

  <!-- Inner circle -->
  <circle cx="120" cy="93" r="18" fill="#1e1b4b"/>

  <!-- Upward arrow -->
  <polyline points="112 100 120 82 128 100"
            fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="120" y1="82" x2="120" y2="104"
        stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="120" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="15.5"
        font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">Move Up Mapper</text>

  <!-- Tagline -->
  <text x="120" y="216" font-family="Arial, Helvetica, sans-serif" font-size="10.5"
        fill="#818cf8" text-anchor="middle" letter-spacing="0.8">HOUSING · MATH · DECISIONS</text>
</svg>
